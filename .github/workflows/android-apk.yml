name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✔ Node 22 (مطلوب Capacitor)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ✔ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✔ Clean install (fix rollup + tailwind + npm issues)
      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --include=optional --legacy-peer-deps

      # ✔ Fix missing dependency from recharts
      - name: Install missing dependency (react-is)
        run: npm install react-is --legacy-peer-deps

      # ✔ Rebuild native modules
      - name: Rebuild dependencies
        run: npm rebuild

      # ✔ CI flag (for vite.config.ts to disable tailwind plugin in CI)
      - name: Set CI flag
        run: echo "CI=true" >> $GITHUB_ENV

      # ✔ Build web (Vite)
      - name: Build web app
        run: npm run build

      # ✔ Capacitor sync
      - name: Sync Capacitor
        run: npx cap sync android

      # ✔ FIX Gradle wrapper corruption (IMPORTANT)
      - name: Fix Gradle Wrapper (rebuild)
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          export PATH=$PATH:/tmp/gradle/gradle-8.7/bin
          gradle wrapper --gradle-version 8.7

      # ✔ Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✔ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
