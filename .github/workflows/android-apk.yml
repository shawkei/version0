name: Build Clean Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Node (مهم جدًا Capacitor + Vite)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3) Java (موحد بدون تعقيد)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4) Clean install (استقرار كامل npm)
      - name: Install dependencies clean
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      # 5) Fix missing dependency (recharts safe)
      - name: Fix missing deps
        run: npm install react-is --legacy-peer-deps

      # 6) Build Web (Vite)
      - name: Build Web App
        run: |
          rm -rf dist
          npm run build

      # 7) Verify build output
      - name: Check dist output
        run: ls -la dist

      # 8) Sync Capacitor (clean)
      - name: Sync Capacitor
        run: |
          rm -rf android/app/src/main/assets/public
          npx cap sync android

      # 9) Fix Gradle wrapper (stable version)
      - name: Fix Gradle Wrapper
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L https://services.gradle.org/distributions/gradle-8.13-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          export PATH=$PATH:/tmp/gradle/gradle-8.13/bin
          gradle wrapper --gradle-version 8.13

      # 10) Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 11) Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
